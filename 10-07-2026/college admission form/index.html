<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div class="admission-bg-container">
            <div>
                <h1 class="main-heading">College Admission Form</h1>
            </div>
            <div class="information-card">
                <div>
                <form class="form">
                    <label class="label">Student Name:</label>
                    <input type="text"/>
                </form>
                <form class="form">
                    <label class="label">Father Name:</label>
                    <input type="text"/>
                </form>
                <form class="form">
                    <label class="label">Email:</label>
                    <input type="text"/>
                </form>
                <form class="form">
                    <label class="label">Contact no:</label>
                    <input type="tel"/>
                </form>
                <form class="form">
                    <label class="label">Course Selection:</label>
                    <input type="checkbox"/>
                    <label class="label2">Full Stack Development</label>      
                    <input type="checkbox"/>
                    <label class="label2">Data Science</label>
                    <input type="checkbox"/>
                    <label class="label2">Artificial Intelligence</label>   
                </form>
                <form class="form">
                    <label class="label">Gender:</label>
                    <input type="radio"/>
                    <label class="label2">Male</label>
                    <input type="radio"/>
                    <label class="label2">Female</label>
                    <input type="radio"/>
                    <label class="label2">Other</label>
                </form>
                <form class="form">

                    <label class="label">Address:</label>
                    <input type="text"/>
                </form>
                </div>
               
                <button class="button">Submit</button>

            </div>
        </div>
    </body>
</html>
